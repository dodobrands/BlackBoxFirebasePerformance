name: Unit Tests

on:
  pull_request:
    branches:
      - 'main'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    runs-on: 'macos-latest'

    timeout-minutes: 30

    env:
      SCHEME: "BlackBoxFirebasePerformance"
      OS_VERSION: "26.4"

    strategy:
      matrix:
        include:
          - destination: "platform=iOS Simulator"
            platform: ios
            download_platform: "iOS"
            device: "iPhone 17"
            system_prefix: "iOS"
          - destination: "platform=OS X"
            platform: macos
          - destination: "platform=tvOS Simulator"
            platform: tvos
            download_platform: "tvOS"
            device: "Apple TV 4K (3rd generation)"
            system_prefix: "tvOS"
          - destination: "platform=watchOS Simulator"
            platform: watchos
            download_platform: "watchOS"
            device: "Apple Watch Ultra 3 (49mm)"
            system_prefix: "watchOS"

    steps:
      - name: Get source code
        uses: actions/checkout@v6

      - name: Prepare Environment for App Build
        uses: ./.github/actions/prepare_env_app_build

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies

      - name: Resolve Simulator Runtime
        if: matrix.platform != 'macos'
        id: resolve-runtime
        run: |
          platform="${{ matrix.system_prefix }}"
          requested="${{ env.OS_VERSION }}"
          selected=""

          if xcrun simctl list runtimes | grep -Fq "${platform} ${requested}"; then
            selected="${requested}"
          elif xcodebuild -downloadPlatform ${{ matrix.download_platform }} -buildVersion "${requested}" && \
            xcrun simctl list runtimes | grep -Fq "${platform} ${requested}"; then
            selected="${requested}"
          fi

          if [ -z "${selected}" ]; then
            selected="$(
              xcrun simctl list runtimes |
              awk -v platform="${platform}" '$0 ~ "^" platform " 26\\." && $0 !~ /unavailable/ { print $2 }' |
              sort -V |
              tail -1
            )"
          fi

          if [ -z "${selected}" ]; then
            echo "No available ${platform} 26.x runtime found" >&2
            exit 1
          fi

          echo "Using ${platform} runtime ${selected}"
          echo "version=${selected}" >> "$GITHUB_OUTPUT"

      - name: Create Simulator
        id: create_simulator
        if: matrix.platform != 'macos'
        uses: ./.github/actions/create_sim
        with:
          name: ${{ matrix.device }}
          device: ${{ matrix.device }}
          system: ${{ matrix.system_prefix }}${{ steps.resolve-runtime.outputs.version }}
      
      - name: Select Destination
        id: select-destination
        run: |
          if [ "${{ matrix.platform }}" = "macos" ]; then
            echo "dest=${{ matrix.destination }}" >> $GITHUB_OUTPUT
          else
            echo "dest=${{ matrix.destination }},id=${{ steps.create_simulator.outputs.uuid }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Build
        run: >
          xcodebuild build-for-testing
          -scheme ${{ env.SCHEME }}
          -destination '${{ steps.select-destination.outputs.dest }}'
          -quiet
          SWIFT_SUPPRESS_WARNINGS=NO

      - name: Test
        run: >
          xcodebuild test-without-building
          -scheme ${{ env.SCHEME }}
          -destination '${{ steps.select-destination.outputs.dest }}'
          -quiet
          SWIFT_SUPPRESS_WARNINGS=NO

  # This allows us to have a branch protection rule for tests and deploys with matrix
  status-for-matrix:
    runs-on: 'ubuntu-latest'
    needs: tests
    if: always()
    steps:
      - name: Calculate matrix result
        run: |
          result="${{ needs.tests.result }}"
          if [[ $result == "success" ]]; then
            exit 0
          else
            exit 1
          fi
